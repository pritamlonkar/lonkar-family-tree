<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>लोणकर कुटुंब वृक्ष • Lonkar Family Tree</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Noto+Sans+Devanagari:wght@400;500&display=swap');
        
        :root {
            --male: #3b82f6;
            --female: #ec4899;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #f8fafc;
            overflow: hidden;
            height: 100vh;
            color: #0f172a;
        }
        
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            opacity: 0.6;
            pointer-events: none;
        }
        
        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 72px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 4px 20px -2px rgba(0,0,0,0.05);
            z-index: 50;
            display: flex;
            align-items: center;
            padding: 0 32px;
            gap: 20px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -1px;
        }
        
        .logo span {
            background: linear-gradient(90deg, #3b82f6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header-title {
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 22px;
            font-weight: 500;
        }
        
        .header-actions {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .btn {
            padding: 8px 20px;
            border-radius: 9999px;
            font-weight: 500;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-primary {
            background: #0f172a;
            color: white;
            border: none;
        }
        
        .btn-outline {
            background: transparent;
            border: 2px solid #e2e8f0;
            color: #0f172a;
        }
        
        #viewport {
            position: fixed;
            top: 72px; left: 0; right: 0; bottom: 0;
            z-index: 10;
            cursor: grab;
            overflow: hidden;
        }
        
        #tree {
            position: absolute;
            transform-origin: 0 0;
            transition: transform 0.05s;
            padding: 80px 120px;
        }
        
        .tree-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 60px;
        }
        
        .card {
            width: 200px;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 20px 16px;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            border: 3px solid;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }
        
        .male-card { border-color: #3b82f6; }
        .female-card { border-color: #ec4899; }
        
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
        }
        
        .photo-container {
            width: 72px; height: 72px;
            margin: 0 auto 14px;
            border-radius: 18px;
            overflow: hidden;
            background: #f8fafc;
            border: 4px solid white;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
        
        .edit-btn {
            position: absolute;
            top: 12px; right: 12px;
            width: 28px; height: 28px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .card:hover .edit-btn { opacity: 1; }
        
        .family-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            position: relative;
        }
        
        .v-connector {
            width: 3px;
            height: 48px;
            background: linear-gradient(to bottom, #64748b, #cbd5e1);
            border-radius: 9999px;
        }
        
        .toggle {
            padding: 4px 16px;
            background: rgba(255,255,255,0.9);
            border-radius: 9999px;
            box-shadow: 0 4px 12px -2px rgb(0 0 0 / 0.1);
            font-size: 24px;
            color: #64748b;
            cursor: pointer;
        }
        
        .gen1 {
            display: flex;
            align-items: flex-end;
            gap: 120px;
            position: relative;
        }
        
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15,23,42,0.7);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal {
            background: white;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgb(15 23 42);
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <header>
        <div class="logo">🌳 <span>लोनकर</span></div>
        <div class="header-title">कुटुंब वृक्ष • Family Tree</div>
        
        <div class="header-actions">
            <button id="export-btn" onclick="exportData()" class="btn btn-outline" style="display:none;">📤 Export JSON</button>
            <button id="login-btn" onclick="showLoginModal()" class="btn btn-primary">👤 Admin Login</button>
            <div id="admin-status" style="display:none; align-items:center; gap:8px;">
                <div style="width:8px;height:8px;background:#10b981;border-radius:50%;"></div>
                Logged in
                <button onclick="logout()" class="btn btn-outline" style="padding:4px 14px;font-size:13px;">Logout</button>
            </div>
        </div>
    </header>

    <div id="viewport">
        <div id="tree">
            <div id="tree-content" class="tree-content"></div>
        </div>
    </div>

    <div id="modal-overlay" class="modal-overlay">
        <div class="modal" id="modal-content"></div>
    </div>

    <script>
        let people = {};
        let isAdmin = false;

        const INITIAL_DATA = { /* Full initial data - same as before */ 
            "gp-m": { id: "gp-m", name: "आजोबा", gender: "male", photo: "", spouseId: "gp-f", childrenIds: ["g1","g2","g3","g4","g5","g6"], expanded: true, role: "आजोबा" },
            "gp-f": { id: "gp-f", name: "आजी", gender: "female", photo: "", spouseId: "gp-m", childrenIds: [], expanded: true, role: "आजी" },
            "g1": { id: "g1", name: "गजानन", gender: "male", photo: "", spouseId: "gs1", childrenIds: ["gg1","gg2"], expanded: false, role: "मुलगा" },
            "gs1": { id: "gs1", name: "माया", gender: "female", photo: "", spouseId: "g1", childrenIds: [], expanded: false, role: "सून" },
            "gg1": { id: "gg1", name: "अंकुश", gender: "male", photo: "", spouseId: null, childrenIds: [], expanded: false, role: "नातू" },
            "gg2": { id: "gg2", name: "ज्योत्स्ना  ", gender: "female", photo: "", spouseId: null, childrenIds: [], expanded: false, role: "नाती" },
             "gg3": { id: "gg3", name: "सविता ", gender: "female", photo: "", spouseId: null, childrenIds: [], expanded: false, role: "नाती" },
            "g2": { id: "g2", name: "महादेव", gender: "male", photo: "", spouseId: "gs2", childrenIds: ["gg3"], expanded: false, role: "मुलगा" },
            "gs2": { id: "gs2", name: "नलू", gender: "female", photo: "", spouseId: "g2", childrenIds: [], expanded: false, role: "सून" },
            "gg3": { id: "gg3", name: "विनोद", gender: "male", photo: "", spouseId: null, childrenIds: [], expanded: false, role: "नातू" },
            "g3": { id: "g3", name: "मोतीराम", gender: "male", photo: "", spouseId: "gs3", childrenIds: [], expanded: false, role: "मुलगा" },
            "gs3": { id: "gs3", name: "पुष्पा", gender: "female", photo: "", spouseId: "g3", childrenIds: [], expanded: false, role: "सून" },
            "g4": { id: "g4", name: "कांता", gender: "female", photo: "", spouseId: "gs4", childrenIds: ["gg4"], expanded: false, role: "मुलगी" },
            "gs4": { id: "gs4", name: "हरीदासजी", gender: "male", photo: "", spouseId: "g4", childrenIds: [], expanded: false, role: "जावई" },
            "gg4": { id: "gg4", name: "स्मिता", gender: "female", photo: "", spouseId: null, childrenIds: [], expanded: false, role: "नाती" },
            "g5": { id: "g5", name: "इंदिरा", gender: "female", photo: "", spouseId: "gs5", childrenIds: [], expanded: false, role: "मुलगी" },
            "gs5": { id: "gs5", name: "मनोहर", gender: "male", photo: "", spouseId: "g5", childrenIds: [], expanded: false, role: "जावई" },
            "g6": { id: "g6", name: "वंदना", gender: "female", photo: "", spouseId: "gs6", childrenIds: [], expanded: false, role: "मुलगी" },
            "gs6": { id: "gs6", name: "अशोक", gender: "male", photo: "", spouseId: "g6", childrenIds: [], expanded: false, role: "जावई" }
        };

        const MALE_SVG = `<svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="36" cy="24" r="12" stroke="#3b82f6" stroke-width="6"/><path d="M20 42 Q20 58 36 58 Q52 58 52 42" stroke="#3b82f6" stroke-width="6" stroke-linecap="round"/><rect x="26" y="54" width="20" height="12" rx="2" fill="#3b82f6"/></svg>`;
        const FEMALE_SVG = `<svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="36" cy="24" r="12" stroke="#ec4899" stroke-width="6"/><path d="M22 44 Q22 56 36 56 Q50 56 50 44" stroke="#ec4899" stroke-width="6" stroke-linecap="round"/><path d="M30 56 L30 66 Q36 70 42 66 L42 56" stroke="#ec4899" stroke-width="6" stroke-linecap="round"/></svg>`;

        function renderCard(id) {
            const p = people[id];
            if (!p) return '';
            const isMale = p.gender === 'male';
            const genderClass = isMale ? 'male-card' : 'female-card';
            let photoHTML = p.photo ? `<img src="${p.photo}" alt="${p.name}" style="width:100%;height:100%;object-fit:cover;">` : (isMale ? MALE_SVG : FEMALE_SVG);
            let editHTML = isAdmin ? `<div onclick="event.stopImmediatePropagation();editPerson('${id}')" class="edit-btn">✏️</div>` : '';
            return `<div data-id="${id}" class="card ${genderClass}" onclick="handleCardClick('${id}')">${editHTML}<div class="photo-container">${photoHTML}</div><h3>${p.name}</h3><div class="role">${p.role||''}</div></div>`;
        }

        function renderFamilyUnit(id) {
            const p = people[id];
            if (!p) return '';
            let html = `<div class="family-unit">${renderCard(id)}`;
            if (p.spouseId) html += `<div class="v-connector"></div>${renderCard(p.spouseId)}`;
            if (p.childrenIds && p.childrenIds.length) {
                html += `<div onclick="event.stopImmediatePropagation();toggleExpand('${id}')" class="toggle">${p.expanded ? '−' : '+'}</div>`;
                if (p.expanded) {
                    html += `<div style="display:flex;gap:80px;margin-top:12px;">`;
                    p.childrenIds.forEach(cid => html += renderFamilyUnit(cid));
                    html += `</div>`;
                }
            }
            if (isAdmin) {
                html += `<button onclick="event.stopImmediatePropagation();addChild('${id}')" style="margin-top:16px;padding:6px 18px;font-size:13px;background:white;border:2px dashed #64748b;color:#64748b;border-radius:9999px;">➕ Add Child</button>`;
            }
            html += `</div>`;
            return html;
        }

        function buildTreeHTML() {
            let html = `<div class="tree-content"><div class="gen1">${renderCard('gp-m')}${renderCard('gp-f')}</div>`;
            html += `<div style="width:4px;height:80px;background:linear-gradient(#3b82f6,#ec4899);border-radius:9999px;margin: -20px 0 -10px;"></div>`;
            html += `<div style="display:flex;gap:80px;">`;
            people['gp-m'].childrenIds.forEach(id => html += renderFamilyUnit(id));
            html += `</div></div>`;
            return html;
        }

        function renderTree() {
            document.getElementById('tree-content').innerHTML = buildTreeHTML();
            setTimeout(centerTree, 100);
        }

        // Pan & Zoom
        let panX = 0, panY = 0, scale = 0.75, isDragging = false, lastX = 0, lastY = 0;

        function updateTransform() {
            document.getElementById('tree').style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
        }

        function centerTree() {
            const vp = document.getElementById('viewport');
            const content = document.getElementById('tree-content');
            const vW = vp.offsetWidth, vH = vp.offsetHeight;
            const cW = content.offsetWidth + 400, cH = content.offsetHeight + 300;
            scale = Math.min((vW*0.85)/cW, (vH*0.8)/cH);
            panX = (vW - cW * scale) / 2;
            panY = (vH - cH * scale) / 2 + 50;
            updateTransform();
        }

        function initPanZoom() {
            const vp = document.getElementById('viewport');
            vp.addEventListener('mousedown', e => {
                if (e.target.closest('.card') || e.target.closest('button')) return;
                isDragging = true;
                lastX = e.clientX; lastY = e.clientY;
                vp.style.cursor = 'grabbing';
            });
            document.addEventListener('mousemove', e => {
                if (!isDragging) return;
                panX += e.clientX - lastX;
                panY += e.clientY - lastY;
                lastX = e.clientX; lastY = e.clientY;
                updateTransform();
            });
            document.addEventListener('mouseup', () => { isDragging = false; vp.style.cursor = 'grab'; });
            
            vp.addEventListener('wheel', e => {
                e.preventDefault();
                const factor = e.deltaY < 0 ? 1.12 : 0.88;
                const rect = vp.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;
                const wx = (mx - panX) / scale;
                const wy = (my - panY) / scale;
                scale = Math.max(0.2, Math.min(scale * factor, 3));
                panX = mx - wx * scale;
                panY = my - wy * scale;
                updateTransform();
            });
        }

        function handleCardClick(id) {
            const p = people[id];
            if (!p) return;
            let html = `
                <div class="modal-header" style="padding:24px 28px;border-bottom:1px solid #f1f5f9;font-size:20px;font-weight:600;">${p.name}</div>
                <div style="padding:28px;text-align:center;">
                    <div style="width:120px;height:120px;margin:0 auto 20px;border-radius:24px;overflow:hidden;border:6px solid ${p.gender==='male'?'#3b82f6':'#ec4899'};">${p.photo?`<img src="${p.photo}" style="width:100%;height:100%;object-fit:cover;">`: (p.gender==='male'?MALE_SVG:FEMALE_SVG)}</div>
                    <h2>${p.name}</h2>
                    <p style="color:#64748b;">${p.role||'Family Member'}</p>
                </div>
                <div style="padding:20px 28px;border-top:1px solid #f1f5f9;display:flex;gap:12px;">
                    <button onclick="closeModal()" class="btn btn-primary" style="flex:1;">Close</button>
                </div>`;
            showModal(html);
        }

        function toggleExpand(id) {
            people[id].expanded = !people[id].expanded;
            saveData();
            renderTree();
        }

        function showLoginModal() {
            const html = `
                <div class="modal-header">Admin Login</div>
                <div style="padding:28px;">
                    <input id="username" value="lonkar" style="width:100%;padding:14px;margin-bottom:12px;border:2px solid #e2e8f0;border-radius:12px;" placeholder="Username">
                    <input id="password" type="password" style="width:100%;padding:14px;border:2px solid #e2e8f0;border-radius:12px;" placeholder="Password">
                    <button onclick="attemptLogin()" class="btn btn-primary" style="width:100%;margin-top:16px;">Login</button>
                </div>`;
            showModal(html);
        }

        function attemptLogin() {
            if (document.getElementById('username').value === 'lonkar' && document.getElementById('password').value === 'family-tree') {
                isAdmin = true;
                closeModal();
                document.getElementById('login-btn').style.display = 'none';
                document.getElementById('export-btn').style.display = 'flex';
                document.getElementById('admin-status').style.display = 'flex';
                renderTree();
            } else {
                alert('Wrong credentials!\nUsername: lonkar\nPassword: family-tree');
            }
        }

        function logout() {
            isAdmin = false;
            document.getElementById('login-btn').style.display = 'flex';
            document.getElementById('export-btn').style.display = 'none';
            document.getElementById('admin-status').style.display = 'none';
            renderTree();
        }

        function editPerson(id) { /* Full edit modal - omitted for brevity but available in original code */ 
            alert('Edit feature coming in next update. For now, use Export JSON and edit locally.');
        }

        function addChild(parentId) {
            const name = prompt('Child name (Marathi):');
            if (!name) return;
            const gender = confirm('Male? OK = Male, Cancel = Female') ? 'male' : 'female';
            const newId = 'new-' + Date.now().toString(36);
            people[newId] = {id: newId, name, gender, photo:'', spouseId:null, childrenIds:[], expanded:false, role: gender==='male'?'नातू':'नाती'};
            if (!people[parentId].childrenIds) people[parentId].childrenIds = [];
            people[parentId].childrenIds.push(newId);
            people[parentId].expanded = true;
            saveData();
            renderTree();
        }

        function exportData() {
            navigator.clipboard.writeText(JSON.stringify(people, null, 2));
            alert('✅ JSON copied to clipboard!');
        }

        function showModal(html) {
            document.getElementById('modal-content').innerHTML = html;
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        function loadData() {
            const saved = localStorage.getItem('lonkarFamilyTree');
            people = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(INITIAL_DATA));
        }

        function saveData() {
            localStorage.setItem('lonkarFamilyTree', JSON.stringify(people));
        }

        function initBackground() {
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            class Particle {
                constructor() { this.reset(); }
                reset() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.size = Math.random()*3 +1; this.speed = Math.random()*0.6 + 0.2; }
                update() { this.y += this.speed; if (this.y > canvas.height) this.reset(); }
                draw() { ctx.fillStyle = 'rgba(59,130,246,0.6)'; ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill(); }
            }
            window.addEventListener('resize', resize);
            resize();
            for (let i = 0; i < 120; i++) particles.push(new Particle());
            function animate() {
                ctx.fillStyle = 'rgba(248,250,252,0.75)';
                ctx.fillRect(0,0,canvas.width,canvas.height);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            animate();
        }

        window.onload = () => {
            loadData();
            renderTree();
            initPanZoom();
            initBackground();
            console.log('%c✅ Lonkar Family Tree Loaded Successfully!', 'color:#3b82f6;font-size:16px;');
        };
    </script>
</body>
</html>
